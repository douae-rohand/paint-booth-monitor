name: Python Service CI

on:
  push:
    paths:
      - 'python-service/**'
  pull_request:
    paths:
      - 'python-service/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          cd python-service
          pip install -r requirements.txt
