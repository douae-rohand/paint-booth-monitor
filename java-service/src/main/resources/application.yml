server:
  port: 8081

spring:
  config:
    import: optional:file:java-service/.env[.properties]
  application:
    name: supervision-service
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: ${SPRING_JPA_SHOW_SQL:true}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

python-service:
  url: ${PYTHON_SERVICE_URL:http://localhost:8000}


jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

app:
  security:
    secure-cookie: ${SECURE_COOKIE:false}
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  admin:
    initial-email: ${ADMIN_INITIAL_EMAIL:admin@renault.com}
    initial-password: ${ADMIN_INITIAL_PASSWORD:ChangeMe123!}
